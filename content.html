<!-- ========== HOMEOWNER RULES ========== -->
<template x-if="page === 'homeowner'">
<div>
  <div class="page-header">
    <div class="container">
      <div class="badge badge-green" style="margin-bottom:12px;">Updated May 2026</div>
      <h1>Electrification Rules for Homeowners</h1>
      <p>What Victoria's new regulations mean for owner-occupiers — and what you need to do.</p>
    </div>
  </div>
  <div class="content-body">
    <h2>What's Changed?</h2>
    <p>Victoria has introduced landmark electrification regulations as part of the state's Gas Substitution Roadmap — a long-term plan to transition the state off natural gas. These rules affect new builds, renovations, and the replacement of existing gas appliances.</p>
    <p>The Building Electrification Regulations were finalised in June 2025 and represent the most significant change to how Victorian homes use energy in decades.</p>

    <h2>Key Rules for Homeowners</h2>

    <h3>New Builds</h3>
    <p>Gas connections are <strong>banned in all new residential buildings</strong>. If you're building a new home in Victoria, it must be all-electric from the start. This applies to building permits lodged after the regulations took effect.</p>

    <h3>Existing Homes — End-of-Life Replacement</h3>
    <p>For existing homeowners, the key rule is:</p>
    <div class="callout callout-amber">
      <div class="callout-icon"><svg width="20" height="20" viewBox="0 0 20 20" fill="none"><path d="M11 2L4 11h5l-2 7 7-9h-5l2-7z" stroke="#0f766e" stroke-width="1.5" stroke-linejoin="round"/></svg></div>
      <div>
        <h4>Gas hot water must be replaced with electric at end-of-life</h4>
        <p>When your gas hot water system breaks down or reaches the end of its working life, you must replace it with an electric alternative (typically a heat pump hot water system). You <strong>cannot</strong> install a new gas hot water system.</p>
      </div>
    </div>
    <p><strong>Important:</strong> The Victorian Government initially proposed mandating heater replacement as well, but backed away from this in the final regulations. Owner-occupiers are <strong>not</strong> currently required to replace gas heaters at end-of-life — only hot water systems.</p>
    <p>However, switching to a reverse-cycle air conditioner for heating is still strongly recommended for cost savings, as they are 3–5x more efficient than gas heaters.</p>

    <h3>Gas Cooktops</h3>
    <p>There is currently no requirement to replace gas cooktops. However, induction cooktops are increasingly popular and offer faster cooking, easier cleaning, and no indoor gas combustion. Many homeowners choose to switch voluntarily.</p>

    <h2>Timeline</h2>
    <div class="timeline">
      <div class="timeline-item">
        <div class="timeline-date">June 2025</div>
        <div class="timeline-content">
          <h4>Building Electrification Regulations Finalised</h4>
          <p>Gas banned in new builds. End-of-life hot water replacement rules take effect.</p>
        </div>
      </div>
      <div class="timeline-item">
        <div class="timeline-date">Early 2026</div>
        <div class="timeline-content">
          <h4>Ceiling Insulation Added to VEU Program</h4>
          <p>New rebates available for ceiling insulation through the Victorian Energy Upgrades program.</p>
        </div>
      </div>
      <div class="timeline-item">
        <div class="timeline-date">Ongoing</div>
        <div class="timeline-content">
          <h4>Gas Substitution Roadmap Continues</h4>
          <p>Further regulations expected as Victoria progresses toward full electrification. Stay informed.</p>
        </div>
      </div>
    </div>

    <h2>What Should I Do?</h2>
    <ol>
      <li><strong>Know your hot water system's age.</strong> Gas hot water systems typically last 10–15 years. If yours is approaching that age, plan ahead for an electric replacement.</li>
      <li><strong>Don't wait for it to fail.</strong> A planned replacement lets you choose the best system and access all available rebates, rather than making an emergency decision.</li>
      <li><strong>Stack your rebates.</strong> You can combine Solar Victoria, VEU, and federal STC rebates to reduce the cost of a heat pump hot water system by up to $2,030.</li>
      <li><strong>Consider going further.</strong> While not required, switching your heating and cooktop to electric can save $600–$1,000+ per year on energy bills.</li>
    </ol>

    <div style="text-align:center; margin-top:40px;">
      <button class="btn btn-primary btn-lg" @click="page='home'; calcStep=1; calc.ownership='owner'; $nextTick(() => document.getElementById('calculator-section')?.scrollIntoView({ behavior: 'smooth' }))">Check My Property Free →</button>
    </div>
  </div>
</div>
</template>

<!-- ========== LANDLORD RULES ========== -->

    </div>
  </div>

    <div class="callout callout-red">
      <div class="callout-icon"><svg width="20" height="20" viewBox="0 0 20 20" fill="none"><circle cx="10" cy="10" r="9" stroke="#dc2626" stroke-width="1.5"/><path d="M10 6v5M10 13.5v.5" stroke="#dc2626" stroke-width="2" stroke-linecap="round"/></svg></div>
      <div>

      </div>

    <h2>How Landlord Rules Differ from Homeowners</h2>
    <p>Landlords face <strong>stricter requirements</strong> than owner-occupiers under Victoria's electrification regulations:</p>
    <ul>
      <li><strong>Both gas hot water AND gas heating</strong> must be replaced with electric alternatives when they reach end-of-life (owner-occupiers only need to replace hot water)</li>
      <li><strong>Minimum Energy Efficiency Standards (MEES)</strong> apply to all rental properties from 1 March 2027</li>
      <li><strong>Advertising compliance</strong> is already enforced — listing a non-compliant property is a criminal offence</li>
      <li><strong>Penalties are significant</strong> — up to 300 penalty units for serious breaches</li>
    </ul>

    <h2>MEES — Minimum Energy Efficiency Standards</h2>
    <p>The Residential Tenancies Amendment (Minimum Energy Efficiency Standards) Regulations 2025 requires all rental properties to meet specific energy efficiency benchmarks by <strong>1 March 2027</strong>.</p>
    <p>Key requirements include adequate insulation, efficient heating and cooling, sealed windows and doors, and the transition away from gas appliances. The exact standards are designed to ensure tenants live in homes that are reasonably energy efficient.</p>

    <h2>Timeline for Landlords</h2>
    <div class="timeline">
      <div class="timeline-item">
        <div class="timeline-date">25 Nov 2025</div>
        <div class="timeline-content">
          <h4>Advertising Compliance In Force</h4>
          <p>Advertising a non-compliant rental property is now a criminal offence. Already active.</p>
        </div>
      </div>
      <div class="timeline-item">
        <div class="timeline-date">June 2025</div>
        <div class="timeline-content">
          <h4>Building Electrification Regulations</h4>
          <p>Gas heating AND hot water must be replaced with electric at end-of-life for rental properties.</p>
        </div>
      </div>
      <div class="timeline-item">
        <div class="timeline-date">1 Mar 2027</div>
        <div class="timeline-content">
          <h4>Full MEES Compliance Deadline</h4>
          <p>All rental properties must meet minimum energy efficiency standards. Non-compliance = penalties.</p>
        </div>
      </div>
    </div>

    <h2>Penalties</h2>
    <ul>
      <li><strong>60 penalty units</strong> for standard breaches of MEES requirements</li>
      <li><strong>300 penalty units</strong> for serious or repeated breaches</li>
      <li>Criminal offence for advertising non-compliant properties</li>
    </ul>
    <p>A penalty unit in Victoria is currently $203.51 (2025–26), so 300 penalty units = approximately <strong>$61,053</strong>.</p>

    <h2>Landlord-Specific Rebates</h2>
    <div class="callout callout-green">
      <div class="callout-icon"><svg width="20" height="20" viewBox="0 0 20 20" fill="none"><circle cx="10" cy="10" r="9" stroke="#0f766e" stroke-width="1.5"/><path d="M10 5v10M7 8h4.5a1.5 1.5 0 010 3H8.5a1.5 1.5 0 000 3H13" stroke="#0f766e" stroke-width="1.5" stroke-linecap="round"/></svg></div>
      <div>
        <h4>Solar for Rentals</h4>
        <p>Up to <strong>$1,400 rebate + $1,400 interest-free loan</strong> per rental property for solar PV. Maximum 2 properties per financial year. Tenant must sign an agreement and co-contribution is capped at $14.58/month.</p>
      </div>
    </div>
    <p>All VEU discounts and federal STCs apply equally to rental properties — there's no distinction between owner-occupied and rental for these rebates.</p>

    <h2>What Should Landlords Do Now?</h2>
    <ol>
      <li><strong>Audit your rental properties immediately.</strong> Check heating, hot water, insulation, and draught sealing against MEES requirements.</li>
      <li><strong>Check advertising compliance.</strong> Ensure any currently advertised properties meet the standards — this is already enforceable.</li>
      <li><strong>Plan upgrades before March 2027.</strong> Don't leave compliance to the last minute — installer demand will spike near the deadline.</li>
      <li><strong>Maximise rebates.</strong> Stack all available incentives to minimise your out-of-pocket costs. Use our calculator to see exactly what's available.</li>
      <li><strong>Factor in rental yield.</strong> Energy-efficient properties command 3–5% higher rents and attract better tenants.</li>
    </ol>

    <div style="text-align:center; margin-top:40px;">
      <button class="btn btn-primary btn-lg" @click="page='home'; calcStep=1; calc.ownership='landlord'; $nextTick(() => document.getElementById('calculator-section')?.scrollIntoView({ behavior: 'smooth' }))">Check My Rental Property →</button>
    </div>
  </div>
</div>
